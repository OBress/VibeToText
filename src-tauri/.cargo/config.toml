# NOTE on CUDA_PATH for Windows local dev:
#
# ct2rs's CMake build uses the deprecated FindCUDA module which
# chokes on Windows paths containing `\P` (backslash-P is parsed as
# a string escape). The NVIDIA CUDA installer sets CUDA_PATH with
# backslashes by default — e.g. `C:\Program Files\NVIDIA GPU
# Computing Toolkit\CUDA\v12.5` — which trips the bug at `\P`.
#
# We used to force forward slashes here via `[env]`, but cargo's
# `[env]` is global (no per-platform conditional), and the override
# poisoned Linux/macOS CI builds (it set CUDA_TOOLKIT_ROOT_DIR to a
# Windows path that doesn't exist on those runners, making ct2rs's
# build script panic).
#
# Per-platform fix:
#   - **Windows local dev**: set `CUDA_PATH` with forward slashes in
#     your shell or a personal `~/.cargo/config.toml`. Example for
#     PowerShell:
#         $env:CUDA_PATH = "C:/Program Files/NVIDIA GPU Computing Toolkit/CUDA/v12.5"
#     See BUILDING.md for the full snippet.
#   - **CI**: the release workflow has a Windows-only step that
#     normalizes CUDA_PATH to forward slashes via PowerShell after
#     the cuda-toolkit action runs.

# Force Rust to use the STATIC C runtime (`/MT`) on Windows MSVC.
# Required because ct2rs builds CTranslate2's C++ with `static_crt(true)`
# in its build.rs — the linker refuses to mix MT-built objects (CT2)
# with MD-built objects (default Rust). Setting this rustflag puts
# Rust on the MT side of the fence so the link succeeds.
#
# Side benefit: end-user .exe doesn't depend on `MSVCP140.dll` /
# `VCRUNTIME140.dll` from the VC++ redistributable, since the C++
# runtime is statically linked into our binary.
#
# Only affects Windows MSVC. macOS / Linux ignore this entry.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
