name: CI

# Fast checks on PRs and pushes to main. Skips the heavy `tauri build`
# step (the C++ compile of CT2 + sherpa-onnx is ~25-35 min) — those
# go through the release workflow when we're actually shipping. CI
# here is just `cargo check` + clippy + fmt + the JS lint, intended
# to fail-fast on most regressions in <5 min once the cache is warm.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust check
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            cmake

      # ct2rs's build script panics without CUDA headers because we
      # have the `cuda` feature enabled for Linux. Even `cargo check`
      # runs the build script. Install the toolkit (cached after the
      # first run, so this only costs ~30 s on warm cache).
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@4bd727d5619dc6fa323b1e76c3aa5dca94f5ec6d  # v0.2.19
        with:
          cuda: "12.5.0"
          method: "network"
          # `toolkit` meta-package — see the comment in
          # release.yml for why we don't pick individual sub-packages.
          sub-packages: '["toolkit"]'
          non-cuda-sub-packages: '[]'

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: src-tauri
          key: ci-rust

      # `cargo fmt --check` is the cheapest gate — runs in seconds.
      # We run it first so a fmt-only PR fails fast without paying
      # the C++ compile cost.
      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt -- --check

      # tauri-build's `generate_context!()` macro validates every
      # `bundle.resources` source path at COMPILE TIME on every
      # platform (the resources field is global, not per-OS), and
      # cargo check runs the build script. The real DLLs are only
      # produced by sherpa-onnx-sys's build script on Windows
      # release builds — on Linux CI they never exist. Pre-create
      # empty stubs so the validation passes; they're never loaded
      # at runtime. Mirrors the same step in release.yml.
      - name: Pre-create DLL stubs for tauri-build validation
        run: |
          mkdir -p src-tauri/bundle-resources
          touch src-tauri/bundle-resources/sherpa-onnx-c-api.dll
          touch src-tauri/bundle-resources/sherpa-onnx-cxx-api.dll
          touch src-tauri/bundle-resources/onnxruntime.dll
          touch src-tauri/bundle-resources/onnxruntime_providers_shared.dll

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

  frontend:
    name: Frontend check
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      # No formal lint setup yet — at least verify the package
      # installs cleanly and the JS files parse via node's syntax
      # check (covers the most common "unmatched brace" mistake).
      - run: |
          for f in src/*.js; do
            node --check "$f"
          done
