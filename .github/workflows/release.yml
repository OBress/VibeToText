name: Release

# Triggers a cross-platform binary build and attaches the resulting
# installers to a GitHub Release. Run by:
#   1. pushing a tag matching `v*` (e.g. `v0.1.0`) — produces a draft
#      release with auto-generated notes that a maintainer reviews
#      and publishes manually.
#   2. dispatching the workflow manually from the Actions tab — useful
#      for one-off rebuilds without bumping a tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Concurrency control: a second push to the same tag (rare, but
# possible during retries) cancels the in-flight run instead of
# racing it.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows — NSIS installer + MSI. Pinned to `windows-2022`
          # (VS 2022) rather than `windows-latest`, which now aliases
          # to `windows-2025-vs2026` and ships VS 2026. CUDA 11.8 is
          # the most stable installer on GH-hosted runners (12.x
          # network/local installers both crash with 0xE0E1A019),
          # and 11.8's `host_config.h` rejects MSVC versions newer
          # than VS 2022 with a hard `#error`. windows-2022 is
          # supported by GH through ~2027.
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
            artifact_name: vibe-to-text-windows-x64

          # macOS arm64 (Apple silicon). `macos-latest` is currently a
          # M-series runner.
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
            artifact_name: vibe-to-text-macos-arm64

          # macOS x86_64: dropped from the release matrix.
          # GH-hosted `macos-13` runners (last Intel generation
          # available) are extremely scarce; previous attempts sat
          # in the queue for 40+ minutes per attempt, blocking the
          # whole release. Apple Silicon has been the default since
          # 2020 and the arm64 build runs cleanly under Rosetta 2
          # on any Intel Mac. If we ever need a native Intel build
          # we can re-add this row, but for v0.1.x we ship arm64
          # only on macOS.

          # Linux x86_64 — `.deb` only. AppImage builds via Tauri's
          # bundled linuxdeploy fail on the GH-hosted ubuntu-22.04
          # runner ("failed to run linuxdeploy") — the underlying
          # cause is intermittent and not easily diagnosable from the
          # bundler's swallowed stderr. .deb covers Ubuntu / Debian
          # / Mint / Pop_!OS which is the vast majority of Linux
          # desktop installs; users on other distros can extract
          # the .deb (`ar x`) or build from source. Build runs
          # against ubuntu-22.04 to keep glibc compatibility broad.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb
            artifact_name: vibe-to-text-linux-x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libxdo-dev \
            cmake

      # CT2 needs CUDA headers at COMPILE time even with the
      # `cuda-dynamic-loading` feature (which only delays the
      # libcuda.so/cudart link to runtime — the build still emits
      # CUDA kernel code). The runner doesn't ship CUDA, so we
      # install the toolkit here. The resulting binary still works
      # on machines without an NVIDIA GPU thanks to dynamic loading.
      #
      # `method: local` (Windows) downloads the full self-contained
      # installer; `method: network` (Linux) streams sub-packages
      # on demand. The network installer is flaky on GH-hosted
      # Windows runners — it routinely crashes with
      # `exit code 3772776473` mid-install — but local works
      # reliably. Linux's local installer is huge (~4 GB), so we
      # use network there for speed.
      - name: Install CUDA Toolkit (Linux)
        if: runner.os == 'Linux'
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: "12.5.0"
          method: "network"
          # `toolkit` is the meta-package that pulls in nvcc + cudart
          # + cublas + their -dev headers. Larger (~2 GB unpacked)
          # than picking individual sub-packages, but the per-
          # subpackage names differ between Linux apt and Windows
          # installer — the previous attempt failed because the
          # Linux mapping turned `cublas_dev` into the non-existent
          # `cuda-cublas_dev-12-5` (real name is `cuda-cublas-dev`)
          # and `cuda_runtime` into a package that doesn't exist at
          # all. `toolkit` sidesteps that name-mapping fragility.
          sub-packages: '["toolkit"]'
          non-cuda-sub-packages: '[]'

      - name: Install CUDA Toolkit (Windows)
        if: runner.os == 'Windows'
        # CUDA version dance:
        #   - 12.5 network/local installers crash on GH runners
        #     (exit 3772776473 / 0xE0E1A019).
        #   - 11.8 installs cleanly but its STL static_assert rejects
        #     the runner's current MSVC ("Unexpected compiler
        #     version, expected CUDA 12.4 or newer.").
        #   - 12.6 (current as of mid-2025) is what we settle on:
        #     installer is stable on `windows-2022` (the older 12.5
        #     issue was tied to windows-2025-vs2026 specifically),
        #     and the STL header is happy with newer MSVC. The
        #     `local` method downloads the full installer up front
        #     (~3 GB) but is more reliable than the streaming
        #     `network` method for Windows runners.
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: "12.6.0"
          method: "local"
          # CT2 uses curand for RNG in some CUDA kernels (random.cu →
          # curand_kernel.h). Without it we get
          # `Cannot open include file: 'curand_kernel.h'`.
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "curand", "curand_dev"]'

      # CT2's CMake config uses the deprecated FindCUDA module, which
      # mis-parses Windows paths containing backslash-P (it treats
      # `\Program` as a C-style escape). cuda-toolkit sets CUDA_PATH
      # with backslashes; we rewrite to forward slashes which both
      # CMake and msbuild accept on Windows.
      - name: Normalize Windows CUDA_PATH to forward slashes
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cuda = $env:CUDA_PATH -replace '\\', '/'
          Write-Host "Normalized CUDA_PATH: $cuda"
          "CUDA_PATH=$cuda" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CUDA_TOOLKIT_ROOT_DIR=$cuda" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: |
          # cmake is preinstalled on the GH-hosted macOS runners; this
          # is a no-op or a quick upgrade. Listed for clarity.
          brew list cmake >/dev/null 2>&1 || brew install cmake

      - name: Verify Windows build deps
        if: runner.os == 'Windows'
        # MSVC + Windows SDK are preinstalled on `windows-latest`; the
        # Tauri build picks them up via vcvars when cargo invokes the
        # linker. We don't try to call `cl.exe` directly here because
        # it isn't on PATH outside an MSVC dev shell — that just
        # produces a confusing failure. CMake comes pre-installed, so
        # we sanity-check that one only.
        run: cmake --version
        shell: pwsh

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache the cargo registry + the target directory. CT2 + sherpa-onnx
      # together compile a lot of C++ via CMake on the first build (~25 min
      # on Linux, ~35 min on Windows); the cache cuts incremental rebuilds
      # to ~5 min.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Bump the suffix to invalidate the cache after a Cargo.toml
          # feature change. rust-cache keys on Cargo.lock, but features
          # don't change Cargo.lock — so a static→shared sherpa-onnx
          # switch leaves stale extracted archives in the cached target
          # dir and rust-lld can't find the new .so files.
          key: ${{ matrix.target }}-release-v2
          cache-targets: true
          cache-on-failure: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm ci

      # The Swatinem/rust-cache action restores `target/` including
      # `target/sherpa-onnx-prebuilt/`, which is where sherpa-onnx-sys
      # extracts the platform archive on first build. Stale entries
      # from a different feature-set (e.g. previous `static` builds)
      # can confuse the linker — clear it before each release build
      # so the build script always pulls a fresh archive matching the
      # active feature flags. Cheap (one network roundtrip + 30-second
      # extract) and saves us from "library not found" surprises.
      - name: Clear sherpa-onnx prebuilt cache
        shell: bash
        run: |
          # Wipe the extracted prebuilt + the build-script's stamped
          # "I already ran" markers so cargo re-runs sherpa-onnx-sys's
          # build.rs and re-extracts the archive matching the active
          # feature flags.
          rm -rf src-tauri/target/sherpa-onnx-prebuilt || true
          rm -rf src-tauri/target/${{ matrix.target }}/release/build/sherpa-onnx-sys-* || true
          rm -rf src-tauri/target/release/build/sherpa-onnx-sys-* || true

      - name: Build app (release)
        env:
          # CUDA 11.8's host_config.h hard-rejects MSVC toolset
          # versions newer than ~17.5 (VS 2022's initial release).
          # The windows-2022 runner ships with a much newer VS 2022
          # update (17.10+ as of mid-2025) so the build fails with
          # `unsupported Microsoft Visual Studio version`. The
          # `-allow-unsupported-compiler` nvcc flag tells CUDA to
          # skip the host-compiler version check; since we only use
          # CUDA-dynamic-loading (the user's libcuda is what
          # actually runs the kernels at execution time), the
          # build-time compatibility with newer MSVC is fine in
          # practice.
          NVCC_PREPEND_FLAGS: ${{ runner.os == 'Windows' && '-allow-unsupported-compiler' || '' }}
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Collect bundle artifacts
        # The Tauri bundler drops its output into target/<triple>/release/bundle/<format>/.
        # Copy everything into a flat staging dir for the upload.
        # Use `find` rather than bash globstar — macOS runners ship
        # bash 3.x which doesn't support `shopt -s globstar`.
        shell: bash
        run: |
          set -e
          mkdir -p artifacts
          find "src-tauri/target/${{ matrix.target }}/release/bundle" -type f \
            \( -name "*.msi" -o -name "*-setup.exe" -o -name "*.dmg" \
               -o -name "*.AppImage" -o -name "*.deb" \) \
            -exec cp -v {} artifacts/ \;
          ls -la artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List collected artifacts
        run: ls -la artifacts/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          # Always start as a draft — a human reviews + publishes manually
          # after smoke-testing the binaries on real hardware.
          draft: true
          generate_release_notes: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: artifacts/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
